name: Build CED

on:
  push:
    branches: [ "main", "port-cinput-ced-to-cpp" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/classpaddev/hollyhock-3:v2.2.1

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Compile
      run: make -j

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CED-Bundle
        path: |
          dist/CED.hh3
          dist/CED.elf
